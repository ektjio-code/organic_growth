<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIKCAST — Organic Growth Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #05070d;
    color: #e8edf5;
  }

  /* Scroll track: how much scroll distance = full growth. */
  #track { height: 600vh; position: relative; }

  /* The plant pins while you scroll through the track. */
  #stage {
    position: sticky; top: 0; height: 100vh; width: 100%;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* Copy that fades in at scroll milestones */
  .copy {
    position: fixed; z-index: 20; pointer-events: none;
    opacity: 0; transition: opacity .6s ease;
    text-align: center; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 640px;
  }
  .copy.show { opacity: 1; }
  .copy h1 { font-size: clamp(28px, 5vw, 56px); font-weight: 600; letter-spacing: -0.02em; }
  .copy h2 { font-size: clamp(22px, 4vw, 40px); font-weight: 500; letter-spacing: -0.02em; }
  .copy p  { font-size: clamp(15px, 2.2vw, 19px); color: #9aa6bd; margin-top: 14px; font-weight: 400; }

  #c-seed   { top: 18%; }
  #c-branch { top: 14%; }
  #c-canopy { top: 12%; }

  /* Feature hotspot tooltips (positioned in JS over the canvas) */
  #hotspot-layer { position: fixed; inset: 0; z-index: 30; pointer-events: none; }
  .hotspot {
    position: absolute; pointer-events: auto; cursor: pointer;
    transform: translate(-50%, -50%);
    opacity: 0; transition: opacity .4s ease;
  }
  .hotspot.show { opacity: 1; }
  .hotspot .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #7fffc4; box-shadow: 0 0 12px 3px rgba(127,255,196,.6);
    animation: pulse 2.2s infinite ease-in-out;
  }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:.85} 50%{transform:scale(1.5);opacity:1} }
  .hotspot .label {
    position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
    white-space: nowrap; background: rgba(12,18,30,.92); border: 1px solid rgba(127,255,196,.3);
    padding: 9px 14px; border-radius: 10px; font-size: 13px; line-height: 1.4;
    backdrop-filter: blur(8px); opacity: 0; transition: opacity .25s ease;
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
  }
  .hotspot .label b { color: #7fffc4; display:block; font-size: 12px; margin-bottom: 2px; letter-spacing: .04em; text-transform: uppercase; }
  .hotspot:hover .label { opacity: 1; }

  /* Metric counter at the end */
  #metric {
    position: fixed; bottom: 12%; left: 50%; transform: translateX(-50%);
    z-index: 20; text-align: center; opacity: 0; transition: opacity .8s ease;
  }
  #metric.show { opacity: 1; }
  #metric .num { font-size: clamp(40px, 8vw, 88px); font-weight: 700; color: #7fffc4; letter-spacing: -0.03em; font-variant-numeric: tabular-nums; }
  #metric .cap { font-size: 14px; color: #9aa6bd; letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; }

  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 40;
    color: #5d6b85; font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
    animation: fade 2.4s infinite; transition: opacity .4s;
  }
  @keyframes fade { 0%,100%{opacity:.35} 50%{opacity:.9} }

  /* tiny debug readout */
  #dbg { position: fixed; top: 12px; left: 12px; z-index: 50; font-size: 11px;
         color: #44506a; font-variant-numeric: tabular-nums; }
</style>
</head>
<body>

<div id="dbg">growth: <span id="d-g">0</span>%</div>

<div id="track">
  <div id="stage">
    <canvas id="cv"></canvas>
  </div>
</div>

<!-- Scroll-milestone copy -->
<div class="copy" id="c-seed">
  <h1>One command.</h1>
  <p>Set it once. Then step away.</p>
</div>
<div class="copy" id="c-branch">
  <h2>It grows on its own.</h2>
  <p>Distributed naturally — never on a schedule, never the same twice.</p>
</div>
<div class="copy" id="c-canopy">
  <h2>Organic growth.</h2>
  <p>A presence that compounds, paced like something alive.</p>
</div>

<!-- Hotspots (positioned over branch points in JS) -->
<div id="hotspot-layer"></div>

<!-- End metric -->
<div id="metric">
  <div class="num" id="m-num">0</div>
  <div class="cap">actions grown from a single command</div>
</div>

<div id="hint">Scroll to grow ↓</div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const track = document.getElementById('track');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildTree();      // recompute layout for new size
}

// ---- Seeded RNG so the tree is identical every render (organic but stable) ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// ---- The branching system ----
// Each segment: x0,y0,x1,y1, depth, width, order (0..1 = when it appears during growth)
let segments = [];
let tips = [];          // branch endpoints, for hotspots/leaves
let maxOrder = 1;

function buildTree() {
  segments = [];
  tips = [];
  const rand = mulberry32(20260615);   // fixed seed

  const baseX = W * 0.5;
  const baseY = H * 0.94;              // seed near bottom
  const trunkLen = H * 0.20;

  // recursive grow: returns nothing, pushes segments
  // order is a 0..1 "growth time" — deeper = later
  function grow(x, y, angle, len, width, depth, order) {
    if (depth > 9 || len < 6) {
      tips.push({ x, y, order, depth });
      return;
    }
    // organic curve: nudge angle slightly along the segment
    const drift = (rand() - 0.5) * 0.18;
    const a = angle + drift;
    const x1 = x + Math.cos(a) * len;
    const y1 = y + Math.sin(a) * len;

    segments.push({ x0:x, y0:y, x1, y1, depth, width, order });
    maxOrder = Math.max(maxOrder, order);

    // how many children: mostly 2, sometimes 3, occasionally 1
    const r = rand();
    const children = r < 0.12 ? 1 : (r > 0.82 ? 3 : 2);

    // organic timing: each child appears a little later, with variation
    for (let i = 0; i < children; i++) {
      // spread angle: branches fan out from current direction
      const spread = (0.32 + rand() * 0.30);
      const dir = children === 1 ? (rand()-0.5)*0.4
                 : (i - (children-1)/2) * spread + (rand()-0.5)*0.12;
      const childLen = len * (0.74 + rand() * 0.12);
      const childW = width * 0.72;
      // the organic delay: child growth-time = parent + variable gap
      const gap = 0.055 + rand() * 0.085;
      grow(x1, y1, a + dir, childLen, childW, depth + 1, order + gap);
    }
  }

  // upward = negative Y. trunk points up (-PI/2)
  grow(baseX, baseY, -Math.PI/2, trunkLen, Math.max(W,H)*0.012, 0, 0);

  // normalize order to 0..1
  segments.forEach(s => s.order /= maxOrder);
  tips.forEach(t => t.order /= maxOrder);

  // pick a few tips as feature hotspots (spread across growth time)
  pickHotspots();
}

// ---- Hotspots ----
const hotspotDefs = [
  { title: "Hands-off",   text: "One setup. It runs without you.", at: 0.10 },
  { title: "Distributed", text: "One command, fanned out across your presence.", at: 0.52 },
  { title: "Organic pace", text: "Timed like a human — never a pattern.", at: 0.80 },
  { title: "Compounding",  text: "Reach that keeps building on itself.", at: 0.97 },
];
let hotspots = [];
function pickHotspots() {
  hotspots = [];
  hotspotDefs.forEach(def => {
    // find the tip whose order is closest to def.at
    let best = null, bestD = 1e9;
    tips.forEach(t => { const d = Math.abs(t.order - def.at); if (d < bestD){bestD=d;best=t;} });
    if (best) hotspots.push({ ...def, x: best.x, y: best.y, order: best.order });
  });
  renderHotspotDom();
}
function renderHotspotDom() {
  const layer = document.getElementById('hotspot-layer');
  layer.innerHTML = '';
  hotspots.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'hotspot'; el.id = 'hs'+i;
    el.style.left = h.x + 'px'; el.style.top = h.y + 'px';
    el.innerHTML = `<div class="dot"></div><div class="label"><b>${h.title}</b>${h.text}</div>`;
    layer.appendChild(el);
  });
}

// ---- Draw the tree up to growth amount g (0..1) ----
function draw(g) {
  ctx.clearRect(0, 0, W, H);

  // subtle vignette glow at the seed
  const grd = ctx.createRadialGradient(W*0.5, H*0.9, 0, W*0.5, H*0.9, H*0.7);
  grd.addColorStop(0, 'rgba(20,40,55,0.5)');
  grd.addColorStop(1, 'rgba(5,7,13,0)');
  ctx.fillStyle = grd; ctx.fillRect(0,0,W,H);

  ctx.lineCap = 'round';

  for (const s of segments) {
    if (s.order > g) continue;
    // each segment "draws in" over a small window after its order time
    const localSpan = 0.04;
    let t = (g - s.order) / localSpan;
    t = Math.max(0, Math.min(1, t));
    const ease = t < 1 ? (1 - Math.pow(1 - t, 3)) : 1; // easeOutCubic

    const x1 = s.x0 + (s.x1 - s.x0) * ease;
    const y1 = s.y0 + (s.y1 - s.y0) * ease;

    // color: warmer/brighter near tips
    const depthT = s.depth / 9;
    const r = Math.round(60 + depthT * 70);
    const gg = Math.round(180 + depthT * 75);
    const b = Math.round(150 + depthT * 60);
    const alpha = 0.55 + depthT * 0.45;

    ctx.strokeStyle = `rgba(${r},${gg},${b},${alpha})`;
    ctx.lineWidth = Math.max(0.6, s.width);
    ctx.shadowColor = `rgba(127,255,196,${0.35*alpha})`;
    ctx.shadowBlur = 6 + depthT * 8;

    ctx.beginPath();
    ctx.moveTo(s.x0, s.y0);
    ctx.lineTo(x1, y1);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;

  // glowing tips (leaves) that have appeared
  for (const tp of tips) {
    if (tp.order > g) continue;
    let t = (g - tp.order) / 0.05; t = Math.max(0, Math.min(1, t));
    const rad = 1.5 + t * 2.2;
    ctx.fillStyle = `rgba(180,255,220,${0.5*t})`;
    ctx.shadowColor = 'rgba(127,255,196,0.8)'; ctx.shadowBlur = 10*t;
    ctx.beginPath(); ctx.arc(tp.x, tp.y, rad, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

// ---- Scroll → growth binding ----
let targetG = 0, curG = 0;
function scrollProgress() {
  const scrollable = track.offsetHeight - window.innerHeight;
  const y = Math.min(Math.max(window.scrollY, 0), scrollable);
  return scrollable > 0 ? y / scrollable : 0;
}

function updateUI(g) {
  document.getElementById('d-g').textContent = Math.round(g*100);

  // milestone copy
  toggle('c-seed',   g > 0.02 && g < 0.18);
  toggle('c-branch', g > 0.30 && g < 0.55);
  toggle('c-canopy', g > 0.70 && g < 0.92);

  // hotspots appear once their branch has grown
  hotspots.forEach((h,i) => toggle('hs'+i, g >= h.order + 0.02));

  // end metric counts up over the last stretch
  const m = document.getElementById('metric');
  if (g > 0.9) {
    m.classList.add('show');
    const p = Math.min(1, (g - 0.9) / 0.1);
    const val = Math.round(p * 14200);
    document.getElementById('m-num').textContent = val.toLocaleString();
  } else m.classList.remove('show');

  document.getElementById('hint').style.opacity = g > 0.05 ? '0' : '';
}
function toggle(id, on){ const e=document.getElementById(id); if(e) e.classList.toggle('show', on); }

// rAF smoothing loop
function loop() {
  targetG = scrollProgress();
  curG += (targetG - curG) * 0.12;          // ease toward target
  if (Math.abs(targetG - curG) < 0.0005) curG = targetG;
  draw(curG);
  updateUI(curG);
  requestAnimationFrame(loop);
}

window.addEventListener('resize', resize, { passive:true });
resize();
loop();
</script>
</body>
</html>
