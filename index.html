<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLIKCAST — Organic Growth Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: #05070d;
    color: #e8edf5;
  }

  /* Scroll track: how much scroll distance = full growth. */
  #track { height: 1000vh; position: relative; }

  /* The plant pins while you scroll through the track. */
  #stage {
    position: sticky; top: 0; height: 100vh; width: 100%;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #hint {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 40;
    color: #5d6b85; font-size: 13px; letter-spacing: .1em; text-transform: uppercase;
    animation: fade 2.4s infinite; transition: opacity .4s;
  }
  @keyframes fade { 0%,100%{opacity:.35} 50%{opacity:.9} }

  /* CRT overlay — scanlines + vignette + faint phosphor roll/flicker (pure CSS) */
  #crt {
    position: fixed; inset: 0; z-index: 60; pointer-events: none; overflow: hidden;
    background:
      radial-gradient(ellipse at center, rgba(0,0,0,0) 58%, rgba(0,0,0,0.5) 100%),
      repeating-linear-gradient(to bottom,
        rgba(0,0,0,0) 0, rgba(0,0,0,0) 1.5px,
        rgba(0,0,0,0.4) 1.5px, rgba(0,0,0,0.4) 3px);
    animation: crtFlicker 0.16s steps(3) infinite;
  }
  #crt::after {            /* slow phosphor sheen rolling down the screen */
    content: ''; position: absolute; left: 0; right: 0; height: 28%;
    background: linear-gradient(to bottom,
      rgba(127,255,196,0) 0%, rgba(127,255,196,0.05) 50%, rgba(127,255,196,0) 100%);
    animation: crtRoll 7s linear infinite;
  }
  @keyframes crtFlicker { 0%,100%{opacity:.94} 50%{opacity:1} }
  @keyframes crtRoll { 0%{transform:translateY(-120%)} 100%{transform:translateY(360%)} }
</style>
</head>
<body>

<div id="track">
  <div id="stage">
    <canvas id="cv"></canvas>
  </div>
</div>

<div id="hint">Scroll to grow ↓</div>

<!-- CRT scanline / vignette overlay (CSS only) -->
<div id="crt"></div>

<script>
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
const track = document.getElementById('track');
let W, H, DPR;

// Touch devices: no hover, coarse pointer. Drives tap-to-grow + lighter render.
const TOUCH = matchMedia('(hover: none) and (pointer: coarse)').matches;

let lastW = -1;
function resize(force) {
  const w = window.innerWidth;
  // Cap DPR lower on mobile — fill cost scales with DPR², and the wind redraws
  // the whole canvas every frame, so this is the single biggest mobile win.
  const dpr = Math.min(window.devicePixelRatio || 1, TOUCH ? 1.25 : 2);
  // On mobile the browser address bar shows/hides as you scroll, which changes
  // innerHeight constantly. Rebuilding the whole tree on every height twitch
  // makes it jump, so only do the full rebuild on a real layout change — width
  // (covers orientation flips) or DPR. Height-only changes are ignored; the
  // canvas is CSS-stretched to fill, which is imperceptible during the transition.
  if (!force && w === lastW && dpr === DPR) return;
  lastW = w;
  DPR = dpr;
  W = w; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  makeGlowSprite();     // pre-render the tip glow once (cheap to stamp later)
  makeVignette();       // pre-render the background vignette
  makeCompletedLayer(); // allocate the completed-growth cache (rebuilt on demand)
  buildTree();          // recompute layout for new size
}

// ---- Pre-rendered glow sprite ----
// shadowBlur is extremely expensive per draw call. Instead we render one soft
// radial glow into an offscreen canvas and stamp it with drawImage for every tip.
let glowSprite, GLOW_R = 18;
function makeGlowSprite() {
  const size = GLOW_R * 2;
  const oc = document.createElement('canvas');
  oc.width = oc.height = Math.ceil(size * DPR);
  const o = oc.getContext('2d');
  o.scale(DPR, DPR);
  const g = o.createRadialGradient(GLOW_R, GLOW_R, 0, GLOW_R, GLOW_R, GLOW_R);
  g.addColorStop(0,    'rgba(210,255,235,1)');
  g.addColorStop(0.22, 'rgba(150,255,210,0.75)');
  g.addColorStop(0.55, 'rgba(127,255,196,0.28)');
  g.addColorStop(1,    'rgba(127,255,196,0)');
  o.fillStyle = g;
  o.fillRect(0, 0, size, size);
  glowSprite = oc;
}

// ---- Pre-rendered seed vignette ----
// The background glow never changes (fixed to the seed), so bake it once and
// blit it each frame instead of rebuilding a full-screen gradient every time.
let vignette;
function makeVignette() {
  vignette = document.createElement('canvas');
  vignette.width  = Math.ceil(W * DPR);
  vignette.height = Math.ceil(H * DPR);
  const o = vignette.getContext('2d');
  o.setTransform(DPR, 0, 0, DPR, 0, 0);
  const sy = (TOUCH ? 0.5 : 0.9) * H;          // glow follows the seed (centered on mobile)
  const grd = o.createRadialGradient(W*0.5, sy, 0, W*0.5, sy, H*0.7);
  grd.addColorStop(0, 'rgba(20,40,55,0.5)');
  grd.addColorStop(1, 'rgba(5,7,13,0)');
  o.fillStyle = grd; o.fillRect(0, 0, W, H);
}

// ---- Offscreen cache of completed growth ----
// Generations that have finished growing are frozen — re-stroking them (with
// expensive shadowBlur) every frame is wasted work. Render them once into this
// layer and blit it; only rebuild when the fully-grown boundary actually moves.
let completedCv, completedCtx, cachedGen = -1;
let displayCv, displayCtx, tmpCv, tmpCtx;   // bloom: crisp tree composited with its glow
function makeCompletedLayer() {
  completedCv = document.createElement('canvas');
  completedCv.width  = Math.ceil(W * DPR);
  completedCv.height = Math.ceil(H * DPR);
  completedCtx = completedCv.getContext('2d');
  displayCv = document.createElement('canvas');   // the layer actually blitted (glow + lines)
  displayCv.width = completedCv.width; displayCv.height = completedCv.height;
  displayCtx = displayCv.getContext('2d');
  cachedGen = -1;           // force a rebuild on next draw
}
// Crisp strokes (no per-stroke shadowBlur), baked INCREMENTALLY: growing forward
// only appends the newly-completed generations; going backward (desktop scroll up)
// or the first build redraws from scratch. This is what kills the growth stutter.
function buildCompletedLayer(maxGenInclusive) {
  const c = completedCtx;
  c.setTransform(DPR, 0, 0, DPR, 0, 0);
  c.lineCap = 'round';
  let from = cachedGen + 1;
  if (maxGenInclusive < cachedGen || cachedGen < 0) { c.clearRect(0, 0, W, H); from = 0; }
  for (const s of segments) {
    if (s.gen < from || s.gen > maxGenInclusive) continue;
    const depthT = s.depth / 9;
    const r  = Math.round(60  + depthT * 70);
    const gg = Math.round(180 + depthT * 75);
    const b  = Math.round(150 + depthT * 60);
    const alpha = 0.55 + depthT * 0.45;
    c.strokeStyle = `rgba(${r},${gg},${b},${alpha})`;
    c.lineWidth = Math.max(0.6, s.width);
    c.beginPath(); c.moveTo(s.x0, s.y0); c.lineTo(s.x1, s.y1); c.stroke();
  }
  cachedGen = maxGenInclusive;
  buildDisplay();
}
// Glow = ONE Gaussian over a ½-res copy of the crisp tree (~4× cheaper, looks the
// same), composited UNDER the crisp lines into the layer we blit. Rebuilt per bake.
function buildDisplay() {
  if (!tmpCv) { tmpCv = document.createElement('canvas'); tmpCtx = tmpCv.getContext('2d'); }
  const sw = Math.max(1, Math.round(completedCv.width / 2));
  const sh = Math.max(1, Math.round(completedCv.height / 2));
  tmpCv.width = sw; tmpCv.height = sh;
  tmpCtx.setTransform(1, 0, 0, 1, 0, 0);
  tmpCtx.clearRect(0, 0, sw, sh);
  tmpCtx.filter = `blur(${Math.round(3.5 * DPR)}px)`;
  tmpCtx.drawImage(completedCv, 0, 0, sw, sh);      // downscale + blur in one pass
  tmpCtx.filter = 'none';
  const d = displayCtx;
  d.setTransform(1, 0, 0, 1, 0, 0);
  d.clearRect(0, 0, displayCv.width, displayCv.height);
  d.drawImage(tmpCv, 0, 0, displayCv.width, displayCv.height);  // bloom glow underneath
  d.drawImage(completedCv, 0, 0);                               // crisp lines on top
}

// ---- Seeded RNG so the tree is identical every render (organic but stable) ----
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

// ---- The branching system ----
// Each segment: x0,y0,x1,y1, depth, width, order (0..1 = when it appears during growth)
let segments = [];
let tips = [];          // branch endpoints (the absolute ends)
let maxOrder = 1;
let maxGen = 0;         // deepest generation = number of growth steps

function buildTree() {
  segments = [];
  tips = [];
  maxGen = 0;
  const rand = mulberry32(20260615);   // fixed seed

  const baseX = W * 0.5;
  // Mobile seeds at screen center (branches grow up, roots grow down); desktop near bottom.
  const baseY = TOUCH ? H * 0.5 : H * 0.94;
  const trunkLen = H * 0.20;
  groundY = baseY;                     // wind sway grows with height above this; roots below don't sway

  // recursive grow: returns nothing, pushes segments
  // order is a 0..1 "growth time" — deeper = later
  function grow(x, y, angle, len, width, depth, order) {
    if (depth > 9 || len < 6) {
      tips.push({ x, y, order, depth });
      return;
    }
    // organic curve: nudge angle slightly along the segment
    const drift = (rand() - 0.5) * 0.18;
    const a = angle + drift;
    const x1 = x + Math.cos(a) * len;
    const y1 = y + Math.sin(a) * len;

    // gen = depth: every segment at the same depth grows together as one step.
    // The point (x1,y1) is a SPLIT point — where this segment forks into children.
    segments.push({ x0:x, y0:y, x1, y1, depth, width, order, gen: depth, splitX: x1, splitY: y1 });
    maxOrder = Math.max(maxOrder, order);
    maxGen = Math.max(maxGen, depth);

    // how many children: mostly 2, sometimes 3, occasionally 1
    const r = rand();
    const children = r < 0.12 ? 1 : (r > 0.82 ? 3 : 2);

    // organic timing: each child appears a little later, with variation
    for (let i = 0; i < children; i++) {
      // spread angle: branches fan out from current direction
      const spread = (0.32 + rand() * 0.30);
      const dir = children === 1 ? (rand()-0.5)*0.4
                 : (i - (children-1)/2) * spread + (rand()-0.5)*0.12;
      const childLen = len * (0.74 + rand() * 0.12);
      const childW = width * 0.72;
      // the organic delay: child growth-time = parent + variable gap
      const gap = 0.055 + rand() * 0.085;
      grow(x1, y1, a + dir, childLen, childW, depth + 1, order + gap);
    }
  }

  // roots: downward, randomized, finer/tighter splits, tapering (pointed) tips.
  // Pushed into the same segments/tips arrays (flagged isRoot) so they grow,
  // cache and draw with the branches — just lit differently (blink, not steady).
  // central=true → a taproot pulled straight down (fills the mid-lower area).
  // depth capped at 6 so roots finish by ~tap 3 and shed the tiny dense final tips.
  function growRoots(x, y, angle, len, width, depth, order, central) {
    if (depth > 6 || len < 8) { tips.push({ x, y, order, depth, isRoot: true }); return; }
    const drift = (rand() - 0.5) * 0.35;
    let a = angle + drift;
    if (central) {
      a = a * 0.85 + (Math.PI / 2) * 0.15;           // taproot: trend straight down
    } else {
      const horiz = a < Math.PI / 2 ? 0 : Math.PI;   // others: fan outward (wide)
      a = a * 0.8 + horiz * 0.2;
    }
    a = Math.max(0.12, Math.min(Math.PI - 0.12, a)); // stay just below the seed line
    const x1 = x + Math.cos(a) * len;
    const y1 = y + Math.sin(a) * len;
    segments.push({ x0:x, y0:y, x1, y1, depth, width, order, gen: depth, splitX:x1, splitY:y1, isRoot:true });
    maxOrder = Math.max(maxOrder, order);
    maxGen = Math.max(maxGen, depth);
    const r = rand();
    const children = r < 0.4 ? 1 : 2;                // sparse — few splits
    for (let i = 0; i < children; i++) {
      const spread = 0.55 + rand() * 0.6;            // WIDE forks
      const dir = (i - (children-1)/2) * spread + (rand()-0.5) * 0.4;
      const childLen = len * (0.80 + rand() * 0.10); // way longer (slow taper in length)
      const childW = width * 0.62;                   // tapers toward pointed tips
      growRoots(x1, y1, a + dir, childLen, childW, depth + 1, order + 0.04 + rand()*0.07, central);
    }
  }

  // upward = negative Y. trunk points up (-PI/2)
  grow(baseX, baseY, -Math.PI/2, trunkLen, Math.max(W,H)*0.012, 0, 0);

  if (TOUCH) {
    // Roots are MOBILE ONLY (too busy on desktop): not a mirror — a few long
    // primaries radiate across the lower semicircle, forking sparsely into long
    // pointed tendrils (no lights). They may run off-screen — only canopy is fitted.
    const primaries = 5 + Math.floor(rand() * 2);   // 5–6 long primary roots
    for (let i = 0; i < primaries; i++) {
      const ang = 0.3 + (i / (primaries - 1)) * (Math.PI - 0.6) + (rand()-0.5) * 0.2;
      const len = H * 0.16 * (0.85 + rand() * 0.45);
      growRoots(baseX, baseY, ang, len, Math.max(W,H) * 0.011, 0, 0, false);
    }
    // central taproots: fill the empty mid-lower area straight below the seed
    for (let i = 0; i < 2; i++) {
      const ang = Math.PI/2 + (rand()-0.5) * 0.25;
      const len = H * 0.18 * (0.9 + rand() * 0.3);
      growRoots(baseX, baseY, ang, len, Math.max(W,H) * 0.011, 0, 0, true);
    }
    fitTreeCentered(baseX, baseY);
  } else {
    fitTree(baseX, baseY);   // scale to fit the viewport (esp. tall/narrow phones)
  }

  // normalize order to 0..1
  segments.forEach(s => s.order /= maxOrder);
  tips.forEach(t => t.order /= maxOrder);
}

// ---- Fit the tree to the viewport ----
// Measure the grown tree's extent and, if it overflows, scale it down (anchored
// at the seed) so it sits within the frame with margins. Only ever shrinks, so a
// tree that already fits (e.g. desktop) is left exactly as-is.
function fitTree(baseX, baseY) {
  let minX = baseX, maxX = baseX, minY = baseY;
  for (const s of segments) {
    minX = Math.min(minX, s.x0, s.x1);
    maxX = Math.max(maxX, s.x0, s.x1);
    minY = Math.min(minY, s.y0, s.y1);
  }
  for (const t of tips) {
    minX = Math.min(minX, t.x); maxX = Math.max(maxX, t.x); minY = Math.min(minY, t.y);
  }
  const halfExtent = Math.max(baseX - minX, maxX - baseX, 1); // widest side from trunk
  const treeH = Math.max(baseY - minY, 1);
  const scaleW = (W * 0.45) / halfExtent;        // ~5% margin each side
  const scaleH = (baseY - H * 0.08) / treeH;     // ~8% margin above the canopy
  const scale = Math.min(scaleW, scaleH, 1);     // never zoom in
  if (scale >= 0.999) return;
  for (const s of segments) {
    s.x0 = baseX + (s.x0 - baseX) * scale; s.y0 = baseY + (s.y0 - baseY) * scale;
    s.x1 = baseX + (s.x1 - baseX) * scale; s.y1 = baseY + (s.y1 - baseY) * scale;
    s.splitX = baseX + (s.splitX - baseX) * scale; s.splitY = baseY + (s.splitY - baseY) * scale;
    s.width *= scale;
  }
  for (const t of tips) {
    t.x = baseX + (t.x - baseX) * scale; t.y = baseY + (t.y - baseY) * scale;
  }
}

// ---- Mobile: fit the canopy around the centered seed ----
// Seed sits at screen center. Scale uniformly (anchored at the seed) so the
// CANOPY reaches near the top without exceeding the side margins. Roots are
// excluded from the measurement — they're allowed to run long and off-screen.
function fitTreeCentered(baseX, baseY) {
  let minX = baseX, maxX = baseX, minY = baseY;
  for (const s of segments) {
    if (s.isRoot) continue;
    minX = Math.min(minX, s.x0, s.x1); maxX = Math.max(maxX, s.x0, s.x1);
    minY = Math.min(minY, s.y0, s.y1);
  }
  for (const t of tips) {
    if (t.isRoot) continue;
    minX = Math.min(minX, t.x); maxX = Math.max(maxX, t.x); minY = Math.min(minY, t.y);
  }
  const halfExtent = Math.max(baseX - minX, maxX - baseX, 1);
  const upH = Math.max(baseY - minY, 1);            // branches, above the seed
  const scaleW  = (W * 0.45) / halfExtent;          // ~5% side margins (canopy)
  const scaleUp = (baseY - H * 0.06) / upH;         // canopy ~6% from the top
  const scale = Math.min(scaleW, scaleUp);
  for (const s of segments) {
    s.x0 = baseX + (s.x0 - baseX) * scale; s.y0 = baseY + (s.y0 - baseY) * scale;
    s.x1 = baseX + (s.x1 - baseX) * scale; s.y1 = baseY + (s.y1 - baseY) * scale;
    s.splitX = baseX + (s.splitX - baseX) * scale; s.splitY = baseY + (s.splitY - baseY) * scale;
    s.width *= scale;
  }
  for (const t of tips) {
    t.x = baseX + (t.x - baseX) * scale; t.y = baseY + (t.y - baseY) * scale;
  }
}

// ---- Stepped playback model ----
// Scroll 0..1 is divided into (maxGen+1) STEPS. Each step has:
//   - a GROW phase (first GROW_FRAC of the step): this generation's segments
//     animate from their parent split point out to their own split point.
//   - a DWELL phase (remaining): growth holds at the splits, which GLOW.
// Because every step ends exactly at a fork, growth never pauses mid-limb.
const GROW_FRAC = 0.6;   // 60% of each step grows, 40% dwells+glows

// Returns { gen, growT (0..1 within grow phase), dwellT (0..1 within dwell, else 0) }
function phaseFromScroll(p) {
  const steps = maxGen + 1;
  const stepF = p * steps;            // 0..steps
  const gen = Math.min(maxGen, Math.floor(stepF));
  const within = stepF - gen;         // 0..1 inside this step
  let growT, dwellT;
  if (within < GROW_FRAC) {
    growT = within / GROW_FRAC;       // growing
    dwellT = 0;
  } else {
    growT = 1;                        // fully grown
    dwellT = (within - GROW_FRAC) / (1 - GROW_FRAC); // 0..1 dwelling
  }
  return { gen, growT, dwellT };
}

// ---- Wind sway (simple left-right) ----
// WIND=true → the tree bends left and right as one. Sway is HORIZONTAL only and
// depends only on height (taller = more sway), so the completed-growth cache can
// be reused: we bake the tree once, then blit it in horizontal strips, each
// shifted sideways by its height's sway. Set WIND=false for a static tree.
const WIND = true;
let groundY = 0;   // y of the seed base; sway grows with height above it
function windX(y, t) {
  const h = groundY - y;
  if (h <= 0) return 0;                       // at/below the base: planted
  const hf = h / H;                           // height fraction (0 base → ~0.9 canopy)
  // Mobile gets a much bigger swing (referenced to the long edge, not the narrow
  // width) so the sway actually reads on a small screen. Desktop unchanged.
  const amp = TOUCH ? hf * hf * Math.max(W, H) * 0.05
                    : hf * hf * W * 0.018;
  return amp * Math.sin(t * 0.0012);          // one sine, whole tree in unison
}

// Blit the composited tree (glow + lines) as horizontal strips, each offset by its sway.
function drawShearedCache(now) {
  const STRIPS = TOUCH ? 24 : 48;
  const band = H / STRIPS;
  const over = 1;                             // 1px overlap hides seams between strips
  for (let i = 0; i < STRIPS; i++) {
    const yTop = i * band;
    const dx = windX(yTop + band / 2, now);
    ctx.drawImage(
      displayCv,
      0, yTop * DPR, displayCv.width, (band + over) * DPR,    // source (device px)
      dx, yTop, W, band + over                                // dest, shifted by dx
    );
  }
}

// A node (a fork or a tip) flashes bright the moment it's reached, then settles
// into a steady pulsation. Drawn with the pre-rendered glow sprite (cheap,
// additive). obj holds .litAt so each node remembers its own ignition time.
const IGNITE_MS = 650;         // duration of the per-node arrival flash
const TW_SPEED = 0.003;        // twinkle cycle speed
const TW_THRESH = 0.84;        // only the top ~16% of each node's cycle lights → sparkle
// Sparkle model: each node still FLASHES on arrival (kept), but instead of staying
// lit it only TWINKLES afterwards — lighting briefly at a staggered, per-node time.
// Most nodes are dark on any given frame and get skipped, so we draw a small
// fraction of them instead of all of them every frame.
function nodeGlow(x, y, obj, now, sizeMul, alphaMul) {
  if (obj.litAt === undefined) obj.litAt = now;
  const age = now - obj.litAt;
  const flash = age < IGNITE_MS ? Math.pow(1 - age / IGNITE_MS, 2) : 0;
  const tw = Math.sin(now * TW_SPEED + x * 0.9 + y * 1.7);   // per-node phase from position
  const twinkle = tw > TW_THRESH ? (tw - TW_THRESH) / (1 - TW_THRESH) : 0;
  const bright = flash * 0.95 + twinkle * 0.7;
  if (bright < 0.02) return;                          // dark this frame → skip (the saving)
  const scale = (0.45 + 0.7 * Math.max(flash, twinkle)) * sizeMul;
  const r = GLOW_R * scale;
  const ox = WIND ? windX(y, now) : 0;               // ride the swaying branch
  ctx.globalAlpha = Math.min(1, bright * alphaMul);
  ctx.drawImage(glowSprite, x + ox - r, y - r, r * 2, r * 2);
}

function draw(p) {
  ctx.clearRect(0, 0, W, H);

  // subtle vignette glow at the seed (pre-rendered once)
  ctx.drawImage(vignette, 0, 0, W, H);
  ctx.lineCap = 'round';

  // Mobile: subtle ground line at the seed — canopy above, roots below.
  if (TOUCH) {
    ctx.strokeStyle = 'rgba(130,190,170,0.16)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
  }

  const now = performance.now();
  const ph = phaseFromScroll(p);

  // Completed generations come from the composited cache (glow + crisp lines);
  // rebuilt only when the fully-grown boundary moves. WIND blits it sheared.
  const fullyGrown = ph.growT >= 1 ? ph.gen : ph.gen - 1;
  if (cachedGen !== fullyGrown) buildCompletedLayer(fullyGrown);
  if (WIND) drawShearedCache(now);
  else      ctx.drawImage(displayCv, 0, 0, W, H);

  // The currently-growing generation animates live as crisp lines (no shadowBlur —
  // that's what stuttered). Its glow appears when it bakes into the cache on settle.
  if (ph.growT < 1) {
    const ease = 1 - Math.pow(1 - ph.growT, 3);   // easeOutCubic
    for (const s of segments) {
      if (s.gen !== ph.gen) continue;
      const x1 = s.x0 + (s.x1 - s.x0) * ease;
      const y1 = s.y0 + (s.y1 - s.y0) * ease;
      const o0 = WIND ? windX(s.y0, now) : 0;     // same horizontal sway, exact
      const o1 = WIND ? windX(y1, now) : 0;

      const depthT = s.depth / 9;
      const r = Math.round(60 + depthT * 70);
      const gg = Math.round(180 + depthT * 75);
      const b = Math.round(150 + depthT * 60);
      const alpha = 0.55 + depthT * 0.45;

      ctx.strokeStyle = `rgba(${r},${gg},${b},${alpha})`;
      ctx.lineWidth = Math.max(0.6, s.width);
      ctx.beginPath(); ctx.moveTo(s.x0 + o0, s.y0); ctx.lineTo(x1 + o1, y1); ctx.stroke();
    }
  }

  // --- Glowing nodes: every fork AND tip FLASHES the moment it's reached (the
  // arrival/"stop" flash), then twinkles — only a fraction light on any frame,
  // giving a living shimmer instead of every node staying lit.
  ctx.globalCompositeOperation = 'lighter';     // glows add together, look hotter

  // forks = every segment's split point; reached once that segment is fully grown.
  for (const s of segments) {
    if (s.isRoot) continue;                       // roots: structure only, no lights
    const reached = s.gen < ph.gen || (s.gen === ph.gen && ph.growT >= 1);
    if (!reached) { s.litAt = undefined; continue; }  // reset if scrolled back past it
    nodeGlow(s.splitX, s.splitY, s, now, 0.55, 0.7);
  }
  // tips = the absolute ends of every branch (the showcase — full size/brightness)
  for (const t of tips) {
    if (t.isRoot) continue;                       // roots have no tip lights
    const tipGen = t.depth - 1;                   // gen of the segment ending here
    const reached = ph.gen > tipGen || (ph.gen === tipGen && ph.growT >= 1);
    if (!reached) { t.litAt = undefined; continue; }
    nodeGlow(t.x, t.y, t, now, 1, 1);
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
}

// ---- Progress binding ----
// Desktop: scroll position drives growth. Touch: each tap advances one step.
let targetP = 0, curP = 0;
let tapStep = 0;                    // touch: how many taps so far
const TAP_STEPS = 4;               // touch: taps from seed to fully grown
function scrollProgress() {
  const scrollable = track.offsetHeight - window.innerHeight;
  const y = Math.min(Math.max(window.scrollY, 0), scrollable);
  return scrollable > 0 ? y / scrollable : 0;
}
function advanceGrowth() {
  if (tapStep < TAP_STEPS) tapStep++;
}

function updateUI(p) {
  // The only UI left is the grow hint. Desktop hides it once growth starts;
  // touch keeps prompting until fully grown.
  const done = tapStep >= TAP_STEPS;
  document.getElementById('hint').style.opacity =
    (TOUCH ? done : p > 0.04) ? '0' : '';
}

// rAF smoothing loop
let lastFrame = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  // Cap to ~30fps on mobile — the wind redraws the whole canvas every frame,
  // and 30fps halves that cost while still reading as smooth sway.
  if (TOUCH && ts - lastFrame < 33) return;
  lastFrame = ts;

  targetP = TOUCH ? Math.min(1, tapStep / TAP_STEPS) : scrollProgress();
  curP += (targetP - curP) * 0.12;
  if (Math.abs(targetP - curP) < 0.0002) curP = targetP;
  draw(curP);
  updateUI(curP);
}

window.addEventListener('resize', () => resize(), { passive:true });
window.addEventListener('orientationchange', () => resize(true), { passive:true });
// On touch, a tap advances the growth one step.
document.addEventListener('click', () => { if (TOUCH) advanceGrowth(); });

if (TOUCH) {
  track.style.height = '100vh';              // no scroll needed; tap drives it
  document.getElementById('hint').textContent = 'Tap to grow';
}

resize(true);
loop();
</script>
</body>
